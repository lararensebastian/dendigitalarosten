<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Den Digitala Rösten</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,600&family=Outfit:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#1a1a1c;--bg-card:#222226;--bg2:#28282e;--deep:#111113;--border:rgba(255,255,255,.10);--bm:rgba(255,255,255,.18);--terra:#e08855;--td:rgba(224,136,85,.14);--tb:rgba(224,136,85,.35);--red:#d04545;--rd:rgba(208,69,69,.12);--rb:rgba(208,69,69,.30);--bluedim:rgba(80,130,220,.12);--blueborder:rgba(80,130,220,.28);--blue:#70a0e0;--text:#c0b0a0;--tm:#ddd0c0;--tb2:#f5f0e8;--dim:#706860;--ok:#58906a;--okd:rgba(88,144,106,.12);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Outfit',sans-serif;background:var(--deep);color:var(--text);min-height:100vh;line-height:1.6;}
    .nav{position:sticky;top:0;z-index:100;background:rgba(17,17,19,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .nav-logo{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--tb2);letter-spacing:-.3px;white-space:nowrap;}
    .nav-logo span{color:var(--terra);}
    .nav-right{display:flex;align-items:center;gap:14px;}
    .nav-steps{display:flex;gap:5px;}
    .nav-step{height:4px;width:24px;border-radius:2px;background:rgba(255,255,255,.07);transition:background .4s;}
    .nav-step.done{background:var(--terra);}
    .nav-step.current{background:var(--terra);opacity:.4;}
    .nav-actions{display:flex;gap:8px;}
    .wrap{max-width:740px;margin:0 auto;padding:36px 20px 100px;}
    .score-row{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
    .chip{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:4px 13px;font-family:'Geist Mono',monospace;font-size:11px;color:var(--dim);transition:all .3s;}
    .chip.lead{border-color:var(--tb);background:var(--td);color:var(--terra);}
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:14px;}
    .badge{display:inline-flex;align-items:center;background:var(--td);border:1px solid var(--tb);border-radius:20px;padding:4px 13px;font-size:12px;font-weight:500;color:var(--terra);margin-bottom:14px;}
    .h1{font-family:'Fraunces',serif;font-size:clamp(22px,3.5vw,30px);font-weight:600;color:var(--tb2);line-height:1.15;margin-bottom:16px;letter-spacing:-.3px;}
    .h1 em{color:var(--terra);font-style:italic;}
    .h2{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--tb2);margin-bottom:12px;}
    p{color:var(--text);font-size:14.5px;line-height:1.85;margin-bottom:12px;}
    p:last-child{margin-bottom:0;}
    strong{color:var(--tm);font-weight:600;}
    .adim{color:var(--dim);font-style:italic;}
    .ac{background:var(--bg2);border:1px solid rgba(208,69,69,.2);border-top:2px solid var(--red);border-radius:12px;padding:18px 20px;margin:18px 0;}
    .ah{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
    .av{width:38px;height:38px;background:linear-gradient(135deg,#2e1a1a,#4a2020);border-radius:10px;border:1px solid rgba(208,69,69,.25);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--red);flex-shrink:0;}
    .an{font-weight:600;font-size:14px;color:var(--tm);}
    .am{font-family:'Geist Mono',monospace;font-size:10px;color:var(--dim);margin-top:2px;}
    .at2{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;}
    .at{font-size:14.5px;color:#c8b8a8;line-height:1.85;}
    .glitch{color:#b05050;font-family:'Geist Mono',monospace;font-size:12px;background:rgba(208,69,69,.1);padding:1px 5px;border-radius:3px;}
    .gfix{color:var(--dim);font-style:italic;font-size:12px;}
    .cb{display:inline-block;width:2px;height:1em;background:var(--red);margin-left:2px;vertical-align:text-bottom;animation:cblink .8s step-end infinite;}
    @keyframes cblink{0%,100%{opacity:1}50%{opacity:0}}
    .sc{background:var(--bluedim);border:1px solid var(--blueborder);border-radius:10px;padding:14px 18px;margin:14px 0;}
    .sl{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:7px;}
    .st{font-size:13.5px;color:#88a8d0;line-height:1.75;}
    .ale{border-radius:10px;padding:14px 18px;margin:14px 0;font-size:13px;line-height:1.7;}
    .ale-t{font-weight:600;font-size:11px;letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase;font-family:'Geist Mono',monospace;}
    .warn{background:rgba(200,140,40,.10);border:1px solid rgba(200,140,40,.28);color:#b89040;}
    .warn .ale-t{color:#c8a030;}
    .danger{background:var(--rd);border:1px solid var(--rb);color:#c07070;}
    .danger .ale-t{color:var(--red);}
    .info{background:var(--bluedim);border:1px solid var(--blueborder);color:#7898c0;}
    .info .ale-t{color:var(--blue);}
    .succ{background:var(--okd);border:1px solid rgba(88,144,106,.35);color:#78a888;}
    .succ .ale-t{color:var(--ok);}
    ul.al{padding-left:18px;margin:8px 0;}
    ul.al li{margin-bottom:5px;font-size:13px;line-height:1.6;}
    .choices{display:flex;flex-direction:column;gap:9px;margin:18px 0;}
    .cbtn{background:var(--bg2);border:1.5px solid var(--bm);border-radius:10px;padding:14px 18px;color:var(--tm);cursor:pointer;text-align:left;font-family:'Outfit',sans-serif;font-size:14px;line-height:1.5;display:flex;align-items:flex-start;gap:12px;transition:all .18s;}
    .cdot{width:18px;height:18px;border-radius:50%;flex-shrink:0;margin-top:1px;border:2px solid rgba(255,255,255,.15);transition:all .18s;}
    .cbtn:hover{border-color:var(--tb);color:var(--tb2);background:rgba(224,136,85,.06);}
    .cbtn:hover .cdot{border-color:var(--terra);background:var(--td);}
    .cbtn.sel{border-color:var(--terra);background:rgba(224,136,85,.08);color:var(--tb2);}
    .cbtn.sel .cdot{border-color:var(--terra);background:var(--terra);}
    .ww{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:26px;margin-top:14px;}
    .wlbl{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--terra);margin-bottom:10px;}
    .wprompt{border-left:2px solid rgba(224,136,85,.35);padding:12px 16px;margin-bottom:18px;background:rgba(224,136,85,.05);border-radius:0 8px 8px 0;font-size:14.5px;color:var(--tb2);line-height:1.85;}
    .wctx{background:var(--bg2);border:1px solid var(--bm);border-radius:8px;padding:14px 16px;margin-bottom:16px;font-size:13.5px;color:var(--text);line-height:1.75;font-style:italic;}
    .sctog{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;background:rgba(224,136,85,.08);border:1px solid var(--tb);border-radius:8px;font-size:12px;color:var(--terra);font-weight:600;user-select:none;transition:background .15s;}
    .sctog:hover{background:rgba(224,136,85,.14);}
    .sctog.open{border-radius:8px 8px 0 0;}
    .scarr{font-size:10px;transition:transform .3s;}
    .sctog.open .scarr{transform:rotate(180deg);}
    .scbody{background:rgba(224,136,85,.04);border:1px solid var(--tb);border-top:none;border-radius:0 0 8px 8px;overflow:hidden;max-height:0;transition:max-height .4s ease;margin-bottom:12px;}
    .scbody.open{max-height:3000px;}
    .scc{padding:18px;}
    .scp{margin-bottom:20px;}
    .scp:last-child{margin-bottom:0;}
    .scpl{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--terra);margin-bottom:8px;}
    .scst{background:rgba(255,255,255,.04);border-left:2px solid var(--tb);padding:10px 14px;border-radius:0 6px 6px 0;font-size:14px;color:var(--tm);line-height:1.75;}
    .schi{font-size:12.5px;color:var(--text);margin-top:6px;line-height:1.55;}
    .exp{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
    .expt{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;background:var(--bg2);font-size:12px;color:var(--dim);font-family:'Geist Mono',monospace;letter-spacing:.5px;user-select:none;transition:color .15s;}
    .expt:hover{color:var(--text);}
    .expa{font-size:9px;transition:transform .3s;}
    .exp.open .expa{transform:rotate(180deg);}
    .expb{max-height:0;overflow:hidden;transition:max-height .4s ease;}
    .exp.open .expb{max-height:3000px;}
    .expc{padding:18px;border-top:1px solid var(--border);font-size:13px;color:var(--text);line-height:1.8;}
    .exph{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--terra);margin:16px 0 8px;}
    .exph:first-child{margin-top:0;}
    .expl{padding-left:18px;line-height:1.85;}
    .expl li{margin-bottom:6px;font-size:13.5px;color:var(--tm);}
    .expex{background:rgba(255,255,255,.03);border-left:2px solid rgba(255,255,255,.15);padding:12px 14px;margin-top:10px;border-radius:0 6px 6px 0;font-style:italic;color:var(--text);font-size:13.5px;line-height:1.8;}
    .vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:16px;border-top:1px solid var(--border);}
    .vw{font-weight:600;font-size:13.5px;color:var(--tb2);}
    .vd{font-size:12.5px;color:var(--text);margin-top:2px;line-height:1.45;}
    textarea{width:100%;min-height:260px;padding:16px;background:var(--deep);border:1px solid var(--border);border-radius:10px;color:var(--tb2);font-family:'Outfit',sans-serif;font-size:14px;line-height:1.8;resize:vertical;transition:border-color .2s;margin-top:4px;}
    textarea:focus{outline:none;border-color:var(--tb);}
    .wcw{margin-top:10px;display:flex;align-items:center;gap:12px;}
    .wcbar{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
    .wcf{height:100%;background:var(--terra);border-radius:2px;transition:width .3s;max-width:100%;}
    .wcf.ok{background:var(--ok);}
    .wct{font-family:'Geist Mono',monospace;font-size:11.5px;color:var(--text);white-space:nowrap;}
    .wct.ok{color:var(--ok);}
    .savrem{background:rgba(224,136,85,.08);border:1px solid var(--tb);border-radius:10px;padding:16px 18px;margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
    .savrem p{color:var(--terra);font-size:13px;margin:0;}
    button{font-family:'Outfit',sans-serif;font-weight:500;border:none;cursor:pointer;border-radius:8px;transition:all .2s;}
    .bp{background:var(--terra);color:#fff;padding:11px 24px;font-size:14px;font-weight:600;}
    .bp:hover{background:#e8965e;transform:translateY(-1px);}
    .bg{background:transparent;color:var(--text);padding:9px 18px;font-size:13px;border:1px solid var(--bm);}
    .bg:hover{border-color:var(--tb);color:var(--tm);}
    .bs{background:var(--ok);color:#fff;padding:11px 24px;font-size:14px;font-weight:600;}
    .bs:hover{background:#68a87a;transform:translateY(-1px);}
    .bcp{background:rgba(224,136,85,.15);color:var(--terra);padding:9px 18px;font-size:13px;border:1px solid var(--tb);}
    .bcp:hover{background:rgba(224,136,85,.25);}
    .brow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:22px;}
    .wey{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:16px;}
    .wtit{font-family:'Fraunces',serif;font-size:clamp(30px,6vw,50px);font-weight:700;color:var(--tb2);letter-spacing:-1px;line-height:1.05;margin-bottom:10px;}
    .wtit em{color:var(--terra);font-style:italic;}
    .wsub{font-size:14px;color:var(--dim);margin-bottom:24px;}
    .wbody{max-width:500px;margin:0 auto 28px;font-size:15px;color:var(--text);line-height:1.8;}
    .chg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;}
    .cht{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 14px;cursor:pointer;text-align:center;transition:all .2s;}
    .cht:hover{border-color:var(--tb);background:rgba(224,136,85,.05);}
    .cht.done{border-color:rgba(88,144,106,.3);background:rgba(88,144,106,.05);}
    .chn{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--terra);line-height:1;margin-bottom:6px;}
    .cht.done .chn{color:var(--ok);}
    .chnm{font-size:12px;color:var(--dim);font-weight:500;}
    .eg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
    .es{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
    .es.top{border-color:var(--tb);background:var(--td);}
    .en{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--terra);line-height:1;}
    .el{font-size:12px;color:var(--dim);margin-top:5px;}
    .divider{height:1px;background:var(--border);margin:20px 0;}
    .hidden{display:none!important;}
    .checklist{background:rgba(88,144,106,.08);border:1px solid rgba(88,144,106,.3);border-radius:12px;padding:20px 22px;margin-top:14px;}
    .checklist-title{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ok);margin-bottom:14px;}
    .chk-item{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;cursor:pointer;user-select:none;}
    .chk-item:last-child{margin-bottom:0;}
    .chk-box{width:20px;height:20px;border:2px solid rgba(88,144,106,.4);border-radius:5px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:transparent;}
    .chk-box.checked{background:var(--ok);border-color:var(--ok);}
    .chk-box.checked::after{content:"v";color:#fff;font-size:11px;font-weight:700;}
    .chk-text{font-size:13.5px;color:var(--text);line-height:1.6;}
    .chk-item.checked .chk-text{color:var(--ok);}
    @keyframes kapDone{0%{box-shadow:0 0 0 0 rgba(88,144,106,.7)}70%{box-shadow:0 0 0 12px rgba(88,144,106,0)}100%{box-shadow:0 0 0 0 rgba(88,144,106,0)}}
    .cht.just-done{animation:kapDone .9s ease;}
    @media(max-width:480px){.chg{grid-template-columns:repeat(2,1fr);}.card,.ww{padding:18px;}}
  </style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">Den Digitala <span>Rösten</span></div>
  <div class="nav-right">
    <div class="nav-steps" id="navSteps"></div>
    <div class="nav-actions">
      <button class="bg" id="copyBtn" onclick="App.copyText()">Kopiera text</button>
      <button class="bg" onclick="RetroExport.open()">Exportera PDF</button>
      <button class="bg" onclick="App.confirmReset()">Börja om</button>
    </div>
  </div>
</nav>
<div class="wrap">
  <div class="score-row hidden" id="scoreRow">
    <div class="chip" id="scR">Risktagare: 0</div>
    <div class="chip" id="scA">Analytiker: 0</div>
    <div class="chip" id="scF">Försiktig: 0</div>
  </div>
  <div id="app"></div>
</div>
<script>
var S={ch:0,texts:{},choices:{},scores:{R:0,A:0,F:0},welcome:true,checks:{},lastDone:0,
  save:function(){try{localStorage.setItem('ddr5',JSON.stringify({ch:this.ch,texts:this.texts,choices:this.choices,scores:this.scores,welcome:this.welcome,checks:this.checks}));}catch(e){}},
  load:function(){try{var d=JSON.parse(localStorage.getItem('ddr5')||'null');if(d){this.ch=d.ch||0;this.texts=d.texts||{};this.choices=d.choices||{};this.scores=d.scores||{R:0,A:0,F:0};this.welcome=d.welcome!==false;this.checks=d.checks||{};}}catch(e){}},
  profile:function(){var r=this.scores.R,a=this.scores.A,f=this.scores.F;if(r>=a&&r>=f)return'R';if(a>=r&&a>=f)return'A';return'F';}
};
var PMAP={'1A':'R','1B':'A','1C':'F','2A':'R','2B':'A','2C':'F','3A':'R','3B':'A','3C':'F','4A':'R','4B':'A','4C':'F','5A':'R','5B':'A','5C':'F'};
var MIN=150;

function wc(t){return t?t.split(/\s+/).filter(function(w){return w.length>0;}).length:0;}

function mkChoices(id,opts){
  var sel=S.choices[id];
  var h='<div class="choices">';
  for(var i=0;i<opts.length;i++){
    var o=opts[i];
    h+='<button class="cbtn'+(sel===o.id?' sel':'')+'" onclick="App.pick('+id+',\''+o.id+'\')">'
      +'<div class="cdot"></div><span>'+o.t+'</span></button>';
  }
  return h+'</div>';
}

function mkScaffold(parts){
  var id='s'+Math.random().toString(36).slice(2,6);
  var h='<div class="sctog open" id="st_'+id+'" onclick="App.togSc(\''+id+'\')">'
    +'<span>★ VAD SKA HÄNDA – uppgifterna kapitel för kapitel</span>'
    +'<span class="scarr">▼</span></div>'
    +'<div class="scbody open" id="sb_'+id+'"><div class="scc">';
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    h+='<div class="scp"><div class="scpl">'+p.l+'</div>'
      +'<div class="scst">'+p.s+'</div>'
      +(p.h?'<div class="schi">'+p.h+'</div>':'')
      +'</div>';
  }
  return h+'</div></div>';
}

function mkExp(lbl,cnt,voc){
  var id='e'+Math.random().toString(36).slice(2,6);
  var vh='';
  if(voc&&voc.length){vh='<div class="vg">';for(var i=0;i<voc.length;i++){vh+='<div><div class="vw">'+voc[i].w+'</div><div class="vd">'+voc[i].d+'</div></div>';}vh+='</div>';}
  return '<div class="exp" id="'+id+'">'
    +'<div class="expt" onclick="App.tog(\''+id+'\')"><span>'+lbl+'</span><span class="expa">▼</span></div>'
    +'<div class="expb"><div class="expc">'+cnt+'</div>'+vh+'</div></div>';
}

function ctx(ch,c){
  var m={
    1:{A:'Du är öppen och aktiv online. Det är en del av dig.',B:'Du är ganska vanlig online.',C:'Du är försiktig med vad du delar. Det har alltid känts självklart.'},
    2:{A:'Du svarade Aiden öppet. Det kändes naturligt – hen verkade trevlig.',B:'Du svarade kort och avvaktande. Ville se vart det ledde.',C:'Du frågade Sam innan du svarade. Sam tyckte det kändes konstigt.'},
    3:{A:'Du bestämde dig för att svara ordentligt. Aiden hade frågat och du hade en åsikt.',B:'Du ville formulera din åsikt men höll det generellt.',C:'Du svarade vagt. Men i ditt huvud tänkte du igenom vad du faktiskt tycker.'},
    4:{A:'Aiden föreslog att ni skulle träffas. Du tänkte att det kändes okej. Sam var inte lika säker.',B:'Aiden föreslog ett möte. Du och Sam bestämde er för att undersöka kontot noggrant först.',C:'Aiden föreslog ett möte. Du kände direkt att det inte stämde.'},
    5:{A:'Du och Sam var på caféet. Aiden kom aldrig. Sedan hittade Sam något på nätet.',B:'Du och Sam undersökte kontot. Det ni hittade var mer än ni väntat er.',C:'Du hade aldrig tänkt träffas. Men Sam hittade något som bekräftade allt.'}
  };
  var cm=m[ch];if(!cm)return'';
  var t=c?(cm[c]||''):'';if(!t)return'';
  return'<div class="wctx">'+t+'</div>';
}

// SCAFFOLD DATA
var SC={
  1:[
    {l:'★ BÖRJA HÄR',s:'Jag heter ... och sitter i klassrummet. Runt mig ser jag ...',h:'Beskriv rummet. Tavlan, bänkarna, fönstret. Sätt scenen.'},
    {l:'★ LÄRAREN SKRIVER PÅ TAVLAN',s:'Läraren skriver: VEM, VAD, NÄR, HUR. Hen förklarar att nästa gång vi stöter på något online ska vi fråga oss ... Jag tänker att ...',h:'Skriv vad läraren säger. Vad tänker du när du hör det?'},
    {l:'★ SAM SITTER BREDVID DIG',s:'Sam sitter bredvid mig. Vi har känt varandra sedan ... En gång ...',h:'Beskriv Sam. Skriv ett litet minne som visar att ni är vänner.'},
    {l:'★ NI BYTER EN BLICK',s:'Sam och jag byter en blick. Jag tänker att ...',h:'Vad tänker du? Vad tänker Sam? Blicken räcker.'},

function mkChecklist(n){

// AUDIO
var Audio={
  ctx:null,
  init:function(){if(this.ctx)return;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}},
  ping:function(){
    this.init();if(!this.ctx)return;
    var ac=this.ctx,t=ac.currentTime;
    var o1=ac.createOscillator(),g1=ac.createGain();
    o1.type='sine';o1.frequency.setValueAtTime(880,t);o1.frequency.exponentialRampToValueAtTime(660,t+0.3);
    g1.gain.setValueAtTime(0.18,t);g1.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o1.connect(g1);g1.connect(ac.destination);o1.start(t);o1.stop(t+0.4);
    var o2=ac.createOscillator(),g2=ac.createGain();
    o2.type='sine';o2.frequency.setValueAtTime(933,t);
    g2.gain.setValueAtTime(0.06,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o2.connect(g2);g2.connect(ac.destination);o2.start(t);o2.stop(t+0.25);
  },
  ch6:function(){
    this.init();if(!this.ctx)return;
    var ac=this.ctx,t=ac.currentTime;
    var m=ac.createGain();
    m.gain.setValueAtTime(0,t);m.gain.linearRampToValueAtTime(0.6,t+1.5);
    m.gain.setValueAtTime(0.6,t+6);m.gain.linearRampToValueAtTime(0,t+10);
    m.connect(ac.destination);
    function tone(freq,st,dur,vol,type){
      var o=ac.createOscillator(),g=ac.createGain();
      o.type=type||'sine';o.frequency.setValueAtTime(freq,st);
      g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(vol,st+0.8);
      g.gain.setValueAtTime(vol,st+dur-1.2);g.gain.linearRampToValueAtTime(0,st+dur);
      o.connect(g);g.connect(m);o.start(st);o.stop(st+dur);
    }
    tone(41.2,t,9,0.2,'sawtooth');tone(61.7,t+0.5,8,0.1);tone(63.0,t+0.5,8,0.07);
    tone(123.5,t+1.2,7,0.08);tone(155.6,t+2.0,6,0.06);tone(740,t+3.5,3,0.04);
  }
};

// TYPEWRITER
var TW={
  run:function(){
    var els=document.querySelectorAll('.at[data-tw]');
    for(var i=0;i<els.length;i++){
      var el=els[i];
      if(el.getAttribute('data-animated'))continue;
      el.setAttribute('data-animated','1');
      this.type(el,el.innerHTML);
    }
  },
  type:function(el,html){
    el.innerHTML='';
    var cur=document.createElement('span');cur.className='cb';el.appendChild(cur);
    var toks=this.tok(html),i=0,stack=[el];
    var D={',':120,'.':180,'!':180,'?':180,':':100};
    function next(){
      if(i>=toks.length){if(cur.parentNode)cur.parentNode.removeChild(cur);return;}
      var t=toks[i++],par=stack[stack.length-1];
      if(t.type==='open'){var n=document.createElement(t.tag);if(t.cls)n.className=t.cls;par.insertBefore(n,cur);stack.push(n);setTimeout(next,0);}
      else if(t.type==='close'){stack.pop();setTimeout(next,0);}
      else{tc(t.val,0,par);}
    }
    function tc(s,idx,par){
      if(idx>=s.length){next();return;}
      var ch=s[idx];par.insertBefore(document.createTextNode(ch),cur);el.appendChild(cur);
      setTimeout(function(){tc(s,idx+1,par);},D[ch]||22);
    }
    next();
  },
  tok:function(html){
    var toks=[],i=0;
    while(i<html.length){
      if(html[i]==='<'){
        var end=html.indexOf('>',i),tag=html.slice(i+1,end);
        if(tag.charAt(0)==='/'){toks.push({type:'close',tag:tag.slice(1).trim()});}
        else{var si=tag.indexOf(' '),tn=si>-1?tag.slice(0,si):tag,cls=null,m=tag.match(/class="([^"]*)"/);if(m)cls=m[1];toks.push({type:'open',tag:tn,cls:cls});}
        i=end+1;
      }else{var txt='';while(i<html.length&&html[i]!=='<')txt+=html[i++];if(txt)toks.push({type:'text',val:txt});}
    }
    return toks;
  }
};

  copyText:function(){
    var N={R:'Risktagare',A:'Analytiker',F:'Försiktig'};
    var CL2={A:'Öppen/aktiv',B:'Vanlig',C:'Försiktig'};
    var CN=['Aktivitet online','Svar till Aiden','Hur mycket delat','Reaktion på mötet','Reaktion på avslöjandet'];
    var p=S.profile();
    var out='DEN DIGITALA RÖSTEN\n'+'='.repeat(40)+'\n';
    out+='Profil: '+N[p]+'  |  R:'+S.scores.R+'  A:'+S.scores.A+'  F:'+S.scores.F+'\n';
    out+='Datum: '+new Date().toLocaleDateString('sv-SE')+'\n'+'='.repeat(40)+'\n\n';
    out+='GJORDA VAL:\n';
    for(var k=1;k<=5;k++){var ch=S.choices[k]||'-';out+='  Kap '+k+' ('+CN[k-1]+'): '+(CL2[ch]||ch)+'\n';}
    out+='\n'+'='.repeat(40)+'\n\n';
    for(var i=0;i<6;i++){
      var txt=S.texts[i+1]||'';
      out+=(i+1)+'. '+NAMES[i].toUpperCase()+'\n';
      out+='Texttyp: '+TYPES[i]+'  |  Ord: '+wc(txt)+'\n\n';
      out+=(txt||'[Inte skrivet]')+'\n\n'+'='.repeat(40)+'\n\n';
    }
    var btn=document.getElementById('copyBtn');
    if(navigator.clipboard){
      navigator.clipboard.writeText(out).then(function(){
        if(btn){btn.textContent='✓ Kopierat!';setTimeout(function(){btn.textContent='Kopiera text';},2500);}
      }).catch(function(){alert('Kunde inte kopiera. Prova igen.');});
    }else{alert('Kopiering stöds inte i den här webbläsaren.');}
  }
};

App.init();
</script>
