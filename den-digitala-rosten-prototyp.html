<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Den Digitala Rösten</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e4e4e7;
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 107, 157, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 50px;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00d9ff 0%, #ff6b9d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: -2px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #94a3b8;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .header-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    /* Progress */
    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d9ff, #ff6b9d);
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
    }

    /* Glass Cards */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    /* Profile */
    .profile-card {
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(255, 107, 157, 0.05) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 28px;
    }

    .profile-title {
      font-size: 0.85rem;
      color: #00d9ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 24px;
      font-weight: 600;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .profile-item {
      text-align: center;
    }

    .profile-icon {
      font-size: 2.2rem;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px rgba(0, 217, 255, 0.3));
    }

    .profile-label {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .profile-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    .profile-bar-fill {
      height: 100%;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .profile-bar-fill.risktagare { 
      background: linear-gradient(90deg, #f97316, #fb923c);
      box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
    }
    .profile-bar-fill.analytiker { 
      background: linear-gradient(90deg, #00d9ff, #3b82f6);
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
    }
    .profile-bar-fill.forsiktig { 
      background: linear-gradient(90deg, #fbbf24, #facc15);
      box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
    }

    .profile-badge {
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(255, 107, 157, 0.1));
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .profile-badge-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 15px rgba(0, 217, 255, 0.5));
    }

    .profile-badge-name {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00d9ff, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .profile-badge-desc {
      font-size: 0.9rem;
      color: #94a3b8;
      font-style: italic;
    }

    /* Vocabulary */
    .vocab-card {
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.03), rgba(255, 107, 157, 0.03));
      backdrop-filter: blur(20px);
      border-left: 3px solid #00d9ff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .vocab-title {
      font-size: 0.9rem;
      color: #00d9ff;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .vocab-item {
      background: rgba(0, 217, 255, 0.05);
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(0, 217, 255, 0.2);
    }

    .vocab-word {
      font-weight: 600;
      color: #00d9ff;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .vocab-definition {
      font-size: 0.85rem;
      color: #cbd5e1;
      line-height: 1.5;
    }

    /* Chapter */
    .chapter-header {
      margin-bottom: 35px;
      padding: 22px;
      background: rgba(255, 255, 255, 0.02);
      border-left: 4px solid #ff6b9d;
      border-radius: 10px;
    }

    .chapter-title {
      font-size: 2rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 8px;
    }

    .chapter-number {
      font-size: 0.8rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 500;
    }

    /* Story */
    .story-intro {
      font-size: 1.05rem;
      color: #ff6b9d;
      font-style: italic;
      margin-bottom: 24px;
      padding-left: 18px;
      border-left: 2px solid #ff6b9d;
    }

    .dm-message {
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.08), rgba(0, 217, 255, 0.12));
      border-left: 3px solid #00d9ff;
      padding: 16px 18px;
      margin: 14px 0;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }

    .dm-sender {
      font-weight: 700;
      color: #00d9ff;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .story-scenario {
      font-size: 1rem;
      line-height: 1.7;
      color: #cbd5e1;
    }

    /* Choices */
    .choices-section {
      margin: 35px 0;
    }

    .choice-question {
      font-size: 1.3rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 24px;
      text-align: center;
    }

    .choice-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .choice-card:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.05);
      border-color: #00d9ff;
      box-shadow: 0 8px 30px rgba(0, 217, 255, 0.2);
    }

    .choice-letter {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #00d9ff, #0ea5e9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #0f172a;
      font-size: 0.85rem;
    }

    .choice-text {
      font-size: 0.98rem;
      line-height: 1.6;
      padding-right: 45px;
      color: #e4e4e7;
      margin-bottom: 12px;
    }

    .choice-effect {
      font-size: 0.85rem;
      color: #00d9ff;
      font-style: italic;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .choice-selected {
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(255, 107, 157, 0.1));
      border: 1px solid rgba(0, 217, 255, 0.3);
      padding: 22px;
      border-radius: 12px;
      margin-bottom: 28px;
    }

    .selected-label {
      font-size: 0.8rem;
      color: #00d9ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .selected-text {
      font-size: 1.05rem;
      color: #f1f5f9;
      margin-bottom: 18px;
    }

    /* Writing */
    .writing-section {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 28px;
    }

    .writing-title {
      font-size: 1.2rem;
      color: #ff6b9d;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .writing-prompt {
      font-size: 0.92rem;
      line-height: 1.7;
      color: #cbd5e1;
      margin-bottom: 22px;
      padding: 18px;
      background: rgba(0, 217, 255, 0.05);
      border-left: 3px solid #00d9ff;
      border-radius: 8px;
    }

    #textArea {
      width: 100%;
      min-height: 400px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      color: #e4e4e7;
      background: rgba(0, 0, 0, 0.3);
      resize: vertical;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #textArea:focus {
      outline: none;
      border-color: #00d9ff;
      box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
    }

    .writing-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      flex-wrap: wrap;
      gap: 14px;
    }

    .word-count {
      font-size: 0.9rem;
      color: #94a3b8;
      font-weight: 500;
    }

    .word-count.complete {
      color: #00d9ff;
      font-weight: 600;
    }

    .word-count.incomplete {
      color: #ff6b9d;
      font-weight: 600;
    }

    /* Buttons */
    button {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 0.9rem;
      padding: 11px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 600;
      letter-spacing: 0.3px;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d9ff, #0ea5e9);
      color: #0f172a;
      box-shadow: 0 4px 14px rgba(0, 217, 255, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 217, 255, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #e4e4e7;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-export {
      background: linear-gradient(135deg, #ff6b9d, #ec4899);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255, 107, 157, 0.4);
    }

    .btn-export:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 157, 0.5);
    }

    /* Teacher */
    .teacher-note {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .teacher-note h3 {
      color: #fbbf24;
      margin-bottom: 10px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .teacher-note p {
      font-size: 0.88rem;
      line-height: 1.6;
      color: #cbd5e1;
    }

    /* Ending */
    .ending-screen {
      text-align: center;
    }

    .ending-title {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00d9ff, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 40px;
    }

    .ending-card {
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.08), rgba(255, 107, 157, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 35px;
      margin-bottom: 35px;
      text-align: left;
    }

    .ending-card h2 {
      font-size: 1.9rem;
      color: #f1f5f9;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .ending-card p {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #cbd5e1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 2.5rem; }
      .chapter-title { font-size: 1.6rem; }
      .profile-grid { grid-template-columns: 1fr; }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Den Digitala Rösten</h1>
      <p class="subtitle">AI · Källkritik · Manipulation</p>
      <div class="header-buttons">
        <button class="btn-export" onclick="app.exportBook()">📚 Ladda ner hela boken</button>
        <button class="btn-secondary" onclick="app.reset()">🔄 Börja om</button>
      </div>
    </header>

    <div class="progress-bar">
      <div class="progress-fill" id="progressBar"></div>
    </div>

    <div id="app"></div>
  </div>

  <script>
    // Story Data (same as before - keeping it identical)
    const STORY = {
      1: {
        title: "Kapitel 1: Min digitala vardag",
        intro: "Innan vi börjar din resa, vem är du egentligen?",
        dmMessages: [],
        scenario: "Du är en vanlig 15-åring. Skolan, kompisar, mobilen - det är din vardag. Men hur mycket tid spenderar du egentligen på skärmar? Och vad tycker de vuxna omkring dig om det?",
        question: "Hur skulle du beskriva din relation till teknik?",
        vocabulary: [
          { word: "Digital", definition: "Som har med datorer och internet att göra" },
          { word: "Uppkopplad", definition: "Vara ansluten till internet" },
          { word: "Skeptisk", definition: "Tvivlande, inte litar direkt på något" }
        ],
        choices: [
          {
            id: "tech_lover",
            text: "Jag älskar teknik - gaming, sociala medier, AI-verktyg. Jag är alltid uppkopplad.",
            effect: "Du känner dig hemma i den digitala världen",
            profile: "risktagare"
          },
          {
            id: "balanced",
            text: "Jag använder teknik lagom mycket. Det är ett verktyg, inget mer.",
            effect: "Du har en balanserad syn på teknologi",
            profile: "analytiker"
          },
          {
            id: "skeptical",
            text: "Jag är faktiskt lite skeptisk. Använder bara det jag måste.",
            effect: "Du är försiktig med ny teknologi",
            profile: "forsiktig"
          }
        ],
        writingPrompt: "Skriv kapitel 1 (minst 100 ord). Presentera dig själv i jag-form. Berätta vem du är, vad du gillar, och beskriva din relation till teknik baserat på ditt val. Nämn en vuxen som är skeptisk till teknik och din bästa vän.",
        teacherNote: "Eleverna tränar BESKRIVANDE TEXT. Bedöm: Presenterar huvudperson tydligt? Beskriver relation till teknik? Nämner vuxen och vän?"
      },
      2: {
        title: "Kapitel 2: Kontakten",
        intro: (prevChoice) => {
          if (prevChoice === 'tech_lover') return "En kväll när du scrollar dyker ett meddelande upp från någon du inte känner...";
          if (prevChoice === 'balanced') return "Du kollar din mobil och ser ett meddelande från okänd profil...";
          return "Du är inte så mycket online, men ikväll får du ett konstigt meddelande...";
        },
        dmMessages: [
          { sender: "Aiden", text: "hej! såg att du går på samma skola som min kompis" },
          { sender: "Aiden", text: "du verkar chill, jag är Aiden btw" },
          { sender: "Aiden", text: "går på gymnasiet här i stan, håller på med ett AI-projekt" }
        ],
        scenario: "Meddelandet kommer från någon som heter Aiden. 17 år, går på gymnasiet i närheten. Verkar helt vanlig. Men du känner inte igen namnet...",
        question: "Hur reagerar du på meddelandet?",
        vocabulary: [
          { word: "Källkritik", definition: "Att kolla om information är sann och trovärdig" },
          { word: "Avsändare", definition: "Den som skickar ett meddelande" },
          { word: "Trovärdig", definition: "När något verkar sant och pålitligt" },
          { word: "Profil", definition: "Sida om en person på sociala medier" }
        ],
        choices: [
          {
            id: "friendly",
            text: "Låter intressant! Jag svarar vänligt och frågar mer.",
            effect: "Du är öppen och nyfiken",
            profile: "risktagare"
          },
          {
            id: "cautious",
            text: "Okej... Jag svarar kort men frågar hur hen hittade mig.",
            effect: "Du är försiktig men svarar",
            profile: "analytiker"
          },
          {
            id: "ignore",
            text: "Känns lite skumt. Jag svarar inte direkt.",
            effect: "Du är skeptisk",
            profile: "forsiktig"
          }
        ],
        writingPrompt: "Skriv kapitel 2 (minst 100 ord). BERÄTTANDE TEXT: Berätta hur du fick meddelandet. Var var du? Hur kändes det? Skriv sedan en KÄLLKRITISK ANALYS: Verkar Aiden trovärdig? Använd källkritikens frågor: VEM är Aiden? VARFÖR skriver hen till mig? KAN JAG KOLLA om det stämmer?",
        teacherNote: "Eleverna tränar BERÄTTANDE TEXT + KÄLLKRITIK. Bedöm: Berättar kronologiskt? Visar källkritiskt tänkande? Ställer rätt frågor?"
      },
      3: {
        title: "Kapitel 3: Gemenskapen",
        intro: (prevChoice) => {
          if (prevChoice === 'friendly') return "Ni fortsätter prata. Aiden verkar smart och intresserad av samma saker som du...";
          if (prevChoice === 'cautious') return "Trots din försiktighet fortsätter Aiden skriva. Hen verkar genuint intresserad...";
          return "Även om du inte svarade direkt skriver Aiden igen några dagar senare...";
        },
        dmMessages: [
          { sender: "Aiden", text: "gör ett projekt om hur AI kan hjälpa unga att påverka samhället" },
          { sender: "Aiden", text: "typ att vår generation kan använda teknik för att göra skillnad" },
          { sender: "Aiden", text: "vuxna fattar ju inte hur saker funkar längre lol" },
          { sender: "Aiden", text: "vad tycker du? känner du att din röst räknas i samhället?" }
        ],
        scenario: "Aiden börjar prata om sitt AI-projekt. Det handlar om hur unga kan använda teknik för att påverka. Hen frågar vad du tycker om demokrati, om du känner att politiker lyssnar på unga. Frågorna känns... relevanta.",
        question: "Hur mycket delar du med Aiden?",
        vocabulary: [
          { word: "Generation", definition: "Grupp människor som är ungefär lika gamla" },
          { word: "Påverka", definition: "Få något att förändras" },
          { word: "Demokrati", definition: "När alla får vara med och bestämma" },
          { word: "Argument", definition: "Skäl eller bevis för en åsikt" }
        ],
        choices: [
          {
            id: "open",
            text: "Jag delar mina åsikter öppet. Det känns viktigt att prata om det här.",
            effect: "Du öppnar dig",
            profile: "risktagare"
          },
          {
            id: "careful",
            text: "Jag håller med lite, men är vag. Vet inte Aiden så bra än.",
            effect: "Du är försiktig med vad du säger",
            profile: "analytiker"
          },
          {
            id: "critical",
            text: "Frågorna känns konstiga. Varför är hen så intresserad av mina åsikter?",
            effect: "Du börjar ifrågasätta",
            profile: "forsiktig"
          }
        ],
        writingPrompt: "Skriv kapitel 3 (minst 100 ord). ARGUMENTERANDE TEXT: Tycker du att unga har tillräckligt inflytande i samhället? Skriv en TES (påstående), minst 2 ARGUMENT för din åsikt, ett MOTARGUMENT och hur du bemöter det, och en SLUTSATS. Använd ord som 'För det första...', 'Dessutom...', 'Å andra sidan...'",
        teacherNote: "Eleverna tränar ARGUMENTERANDE TEXT. Bedöm: Tydlig tes? Minst 2 argument? Motargument + genmäle? Slutsats?"

          alert('Du har inte skrivit något i det här kapitlet än!');

        const content = `DEN DIGITALA RÖSTEN

        this.downloadFile(content, `Kapitel_${chapterNum}_Den_Digitala_Rosten.txt`);

        const completed = Object.keys(this.texts).length;
        if (completed === 0) {
          alert('Du har inte skrivit några kapitel än!');
          return;

        let content = `DEN DIGITALA RÖSTEN

`;

        Object.keys(this.texts).sort((a, b) => Number(a) - Number(b)).forEach(chapterNum => {
          const chapter = STORY[chapterNum];
          const choice = chapter.choices.find(c => c.id === this.choices[chapterNum]);
          const text = this.texts[chapterNum];

          content += `
${chapter.title}

MITT VAL:
${choice ? choice.text : 'Inget val'}

MIN TEXT:
${text}

===========================================

`;
        });

        this.downloadFile(content, 'Den_Digitala_Rosten_Komplett.txt');
      },

      downloadFile(content, filename) {
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      },

                </button>
              `;
            } else if (btnContainer && wordCount < 100) {
              btnContainer.innerHTML = '';
            }
          });
        }
      },

      renderProfile() {
        const total = Math.max(this.currentChapter - 1, 1);
        const dominant = this.getDominantProfile();
        const hasProfile = this.profile.risktagare + this.profile.analytiker + this.profile.forsiktig > 0;

        return `
          <div class="profile-card">
            <h3 class="profile-title">Din profil</h3>
            <div class="profile-grid">
              <div class="profile-item">
                <div class="profile-icon">🔥</div>
                <div class="profile-label">Risktagare</div>
                <div class="profile-bar">
                  <div class="profile-bar-fill risktagare" style="width: ${(this.profile.risktagare / total) * 100}%"></div>
                </div>
              </div>
              <div class="profile-item">
                <div class="profile-icon">🔍</div>
                <div class="profile-label">Analytiker</div>
                <div class="profile-bar">
                  <div class="profile-bar-fill analytiker" style="width: ${(this.profile.analytiker / total) * 100}%"></div>
                </div>
              </div>
              <div class="profile-item">
                <div class="profile-icon">🛡️</div>
                <div class="profile-label">Försiktig</div>
                <div class="profile-bar">
                  <div class="profile-bar-fill forsiktig" style="width: ${(this.profile.forsiktig / total) * 100}%"></div>
                </div>
              </div>
            </div>
            ${hasProfile ? `
              <div class="profile-badge">
                <div class="profile-badge-icon">${PROFILES[dominant].icon}</div>
                <div class="profile-badge-name">${PROFILES[dominant].name}</div>
                <div class="profile-badge-desc">${PROFILES[dominant].description}</div>
              </div>
            ` : ''}
          </div>
        `;
      },

      renderVocabulary(vocab) {
        return `
          <div class="vocab-card">
            <h3 class="vocab-title">📚 Ordlista</h3>
            <div class="vocab-grid">
              ${vocab.map(item => `
                <div class="vocab-item">
                  <div class="vocab-word">${item.word}</div>
                  <div class="vocab-definition">${item.definition}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      },

      renderWritingArea(chapter) {
        const text = this.texts[this.currentChapter] || '';
        const wordCount = this.getWordCount(text);
        const canProceed = wordCount >= 100;

        return `
          <div class="writing-section">
            <h3 class="writing-title">Din skrivuppgift</h3>
            <div class="writing-prompt">${chapter.writingPrompt}</div>
            <textarea id="textArea" placeholder="Börja skriva här...">${text}</textarea>
            <div class="writing-footer">
              <div class="word-count ${canProceed ? 'complete' : 'incomplete'}">
                Ord: ${wordCount} / 100 minimum
                ${!canProceed ? '<br><small>Du behöver skriva minst 100 ord för att fortsätta</small>' : ''}
              </div>
              <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                ${text.length > 50 && canProceed ? `
                  <button class="btn-export" onclick="app.exportChapter(${this.currentChapter})">
                    📄 Ladda ner kapitel
                  </button>
                ` : ''}
                ${canProceed ? `
                  <button class="btn-primary" onclick="app.nextChapter()">
                    ${this.currentChapter === 9 ? 'Avsluta' : 'Nästa kapitel'} →
                  </button>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      },

      renderEnding() {
        const ending = this.getEnding();
        
        return `
          <div class="ending-screen">
            <h1 class="ending-title">SLUT</h1>
            
            <div class="ending-card">
              <h2>${ending.title}</h2>
              <p>${ending.text}</p>
            </div>

            <div class="profile-card">
              <h3 class="profile-title">Din profil genom resan</h3>
              <div style="display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin-bottom: 30px;">
                <div style="text-align: center;">
                  <div style="font-size: 3rem; filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.5));">🔥</div>
                  <div style="color: #f97316; font-weight: 600; margin: 10px 0;">Risktagare</div>
                  <div style="font-size: 2rem; color: #f1f5f9;">${this.profile.risktagare}</div>
                </div>
                <div style="text-align: center;">
                  <div style="font-size: 3rem; filter: drop-shadow(0 0 10px rgba(0, 217, 255, 0.5));">🔍</div>
                  <div style="color: #00d9ff; font-weight: 600; margin: 10px 0;">Analytiker</div>
                  <div style="font-size: 2rem; color: #f1f5f9;">${this.profile.analytiker}</div>
                </div>
                <div style="text-align: center;">
                  <div style="font-size: 3rem; filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.5));">🛡️</div>
                  <div style="color: #fbbf24; font-weight: 600; margin: 10px 0;">Försiktig</div>
                  <div style="font-size: 2rem; color: #f1f5f9;">${this.profile.forsiktig}</div>
                </div>
              </div>
              <div class="profile-badge">
                <div class="profile-badge-icon">${PROFILES[ending.profile].icon}</div>
                <div class="profile-badge-name">${PROFILES[ending.profile].name}</div>
                <div class="profile-badge-desc">${PROFILES[ending.profile].description}</div>
              </div>
            </div>

            <div class="glass-card">
              <h3 style="color: #00d9ff; margin-bottom: 15px; font-size: 1.2rem; font-weight: 600;">
                Vad hände egentligen?
              </h3>
              <p style="margin-bottom: 15px;">
                "Aiden" var inte en riktig person. Det var ett AI-genererat konto skapat för att:
              </p>
              <ul style="padding-left: 25px; line-height: 1.9; color: #cbd5e1;">
                <li>Kartlägga unga människors åsikter och sårbarhet</li>
                <li>Bygga förtroende genom att verka "normal" och "relaterbar"</li>
                <li>Gradvis få dig att dela information och åsikter</li>
                <li>Eventuellt få dig att sprida innehåll eller påverka andra</li>
              </ul>
              <p style="margin-top: 15px;">
                Sådana här påverkanskampanjer är verkliga och pågår just nu på sociala medier. 
                De riktar sig särskilt mot unga för att påverka åsikter och sprida desinformation.
              </p>
            </div>

            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 40px;">
              <button class="btn-export" onclick="app.exportBook()">
                📚 Ladda ner hela boken
              </button>
              <button class="btn-secondary" onclick="app.reset()">
                🔄 Börja om
              </button>
            </div>
          </div>
        `;
      },

      getWordCount(text) {
        return text.split(/\s+/).filter(w => w.length > 0).length;
      }
    };

    app.init();
  </script>
</body>
</html>
