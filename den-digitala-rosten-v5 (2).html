<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Den Digitala Rösten</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,600&family=Outfit:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #1a1a1c;
      --bg-card:      #222226;
      --bg-card2:     #28282e;
      --bg-deep:      #111113;
      --border:       rgba(255,255,255,0.10);
      --border-mid:   rgba(255,255,255,0.18);
      --terra:        #e08855;
      --terra-dim:    rgba(224,136,85,0.14);
      --terra-border: rgba(224,136,85,0.35);
      --red:          #d04545;
      --red-dim:      rgba(208,69,69,0.12);
      --red-border:   rgba(208,69,69,0.30);
      --blue-dim:     rgba(80,130,220,0.12);
      --blue-border:  rgba(80,130,220,0.28);
      --blue:         #70a0e0;
      --text:         #c0b0a0;
      --text-mid:     #ddd0c0;
      --text-bright:  #f5f0e8;
      --text-dim:     #706860;
      --success:      #58906a;
      --success-dim:  rgba(88,144,106,0.12);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(22,22,24,0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 13px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .nav-logo { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; color: var(--text-bright); letter-spacing: -0.3px; white-space: nowrap; }
    .nav-logo span { color: var(--terra); }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-steps { display: flex; gap: 5px; }
    .nav-step { height: 4px; width: 24px; border-radius: 2px; background: rgba(255,255,255,0.07); transition: background 0.4s; }
    .nav-step.done    { background: var(--terra); }
    .nav-step.current { background: var(--terra); opacity: 0.4; }
    .nav-actions { display: flex; gap: 8px; }

    .wrap { max-width: 740px; margin: 0 auto; padding: 36px 20px 100px; }

    .score-row { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
    .score-chip { background: var(--bg-card2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 13px; font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-dim); transition: all 0.3s; }
    .score-chip.lead { border-color: var(--terra-border); background: var(--terra-dim); color: var(--terra); }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 14px; }

    .badge { display: inline-flex; align-items: center; gap: 6px; background: var(--terra-dim); border: 1px solid var(--terra-border); border-radius: 20px; padding: 4px 13px; font-size: 12px; font-weight: 500; color: var(--terra); margin-bottom: 14px; }

    .card-h1 { font-family: 'Fraunces', serif; font-size: clamp(22px, 3.5vw, 30px); font-weight: 600; color: var(--text-bright); line-height: 1.15; margin-bottom: 16px; letter-spacing: -0.3px; }
    .card-h1 em { color: var(--terra); font-style: italic; }
    .card-h2 { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; color: var(--text-bright); margin-bottom: 12px; letter-spacing: -0.2px; }

    p { color: var(--text); font-size: 14.5px; line-height: 1.85; margin-bottom: 12px; }
    p:last-child { margin-bottom: 0; }
    strong { color: var(--text-mid); font-weight: 600; }
    em.story { color: var(--text-dim); font-style: italic; }

    .aiden-card { background: var(--bg-card2); border: 1px solid rgba(192,64,64,0.18); border-top: 2px solid var(--red); border-radius: 12px; padding: 18px 20px; margin: 18px 0; }
    .aiden-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .aiden-avatar { width: 38px; height: 38px; background: linear-gradient(135deg, #2e1a1a, #4a2020); border-radius: 10px; border: 1px solid rgba(192,64,64,0.25); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--red); flex-shrink: 0; }
    .aiden-name { font-weight: 600; font-size: 14px; color: var(--text-mid); }
    .aiden-meta { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 2px; }
    .aiden-tag { margin-left: auto; background: var(--red); color: #fff; font-size: 9px; font-weight: 600; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.3px; }
    .aiden-text { font-size: 14.5px; color: #c8b8a8; line-height: 1.85; }
    .glitch { color: #b05050; font-family: 'Geist Mono', monospace; font-size: 12px; background: rgba(192,64,64,0.1); padding: 1px 5px; border-radius: 3px; }
    .glitch-fix { color: var(--text-dim); font-style: italic; font-size: 12px; }
    .cursor-blink { display: inline-block; width: 2px; height: 1em; background: var(--red); margin-left: 2px; vertical-align: text-bottom; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .sam-card { background: var(--blue-dim); border: 1px solid var(--blue-border); border-radius: 10px; padding: 14px 18px; margin: 14px 0; }
    .sam-label { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--blue); margin-bottom: 7px; }
    .sam-text { font-size: 13.5px; color: #88a8d0; line-height: 1.75; }

    .alert { border-radius: 10px; padding: 14px 18px; margin: 14px 0; font-size: 13px; line-height: 1.7; }
    .alert-title { font-weight: 600; font-size: 11px; letter-spacing: 0.5px; margin-bottom: 6px; text-transform: uppercase; font-family: 'Geist Mono', monospace; }
    .alert-warn   { background: rgba(200,140,40,0.10); border: 1px solid rgba(200,140,40,0.28); color: #b89040; }
    .alert-warn   .alert-title { color: #b08830; }
    .alert-danger { background: var(--red-dim); border: 1px solid var(--red-border); color: #c07070; }
    .alert-danger .alert-title { color: var(--red); }
    .alert-info   { background: var(--blue-dim); border: 1px solid var(--blue-border); color: #7898c0; }
    .alert-info   .alert-title { color: var(--blue); }
    .alert-success{ background: var(--success-dim); border: 1px solid rgba(88,144,106,0.35); color: #78a888; }
    .alert-success .alert-title { color: var(--success); }
    ul.alist { padding-left: 18px; margin: 8px 0; }
    ul.alist li { margin-bottom: 5px; font-size: 13px; line-height: 1.6; }

    .choices { display: flex; flex-direction: column; gap: 9px; margin: 18px 0; }
    .choice-btn { background: var(--bg-card2); border: 1.5px solid var(--border-mid); border-radius: 10px; padding: 14px 18px; color: var(--text-mid); cursor: pointer; text-align: left; font-family: 'Outfit', sans-serif; font-size: 14px; line-height: 1.5; display: flex; align-items: flex-start; gap: 12px; transition: all 0.18s; }
    .choice-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 1px; border: 2px solid rgba(255,255,255,0.1); transition: all 0.18s; }
    .choice-btn:hover { border-color: var(--terra-border); color: var(--text-mid); background: rgba(212,132,90,0.05); }
    .choice-btn:hover .choice-dot { border-color: var(--terra); background: var(--terra-dim); }
    .choice-btn.selected { border-color: var(--terra); background: rgba(212,132,90,0.07); color: var(--text-mid); }
    .choice-btn.selected .choice-dot { border-color: var(--terra); background: var(--terra); }

    /* ── WRITING ── */
    .writing-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 26px; margin-top: 14px; }
    .writing-label { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--terra); margin-bottom: 10px; }
    .writing-prompt { border-left: 2px solid rgba(212,132,90,0.3); padding: 12px 16px; margin-bottom: 18px; background: rgba(212,132,90,0.04); border-radius: 0 8px 8px 0; font-size: 14.5px; color: var(--text-bright); line-height: 1.85; }
    .writing-context { background: var(--bg-card2); border: 1px solid var(--border-mid); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; font-size: 13.5px; color: var(--text); line-height: 1.75; font-style: italic; }

    /* ── SCAFFOLD ── */
    .scaffold { margin-bottom: 16px; }
    .scaffold-toggle { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; cursor: pointer; background: rgba(212,132,90,0.06); border: 1px solid var(--terra-border); border-radius: 8px 8px 0 0; font-size: 12px; color: var(--terra); font-family: 'Geist Mono', monospace; letter-spacing: 0.5px; user-select: none; }
    .scaffold-toggle.closed { border-radius: 8px; }
    .scaffold-arrow { font-size: 9px; transition: transform 0.3s; }
    .scaffold-toggle.open .scaffold-arrow { transform: rotate(180deg); }
    .scaffold-body { background: rgba(212,132,90,0.03); border: 1px solid var(--terra-border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
    .scaffold-body.open { max-height: 2000px; }
    .scaffold-content { padding: 18px; }
    .scaffold-part { margin-bottom: 18px; }
    .scaffold-part:last-child { margin-bottom: 0; }
    .scaffold-part-label { font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--terra); margin-bottom: 6px; }
    .scaffold-starter { background: rgba(255,255,255,0.04); border-left: 2px solid var(--terra-border); padding: 10px 14px; border-radius: 0 6px 6px 0; font-style: italic; font-size: 13.5px; color: var(--text-mid); line-height: 1.75; }
    .scaffold-hint { font-size: 12.5px; color: var(--text); margin-top: 6px; line-height: 1.55; }

    /* ── EXPANDER ── */
    .expander { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
    .exp-trigger { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; cursor: pointer; background: var(--bg-card2); font-size: 12px; color: var(--text-dim); font-family: 'Geist Mono', monospace; letter-spacing: 0.5px; user-select: none; transition: color 0.15s; }
    .exp-trigger:hover { color: var(--text); }
    .exp-arrow { font-size: 9px; transition: transform 0.3s; }
    .expander.open .exp-arrow { transform: rotate(180deg); }
    .exp-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .expander.open .exp-body { max-height: 3000px; }
    .exp-content { padding: 18px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text); line-height: 1.8; }
    .exp-h { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--terra); margin: 16px 0 8px; }
    .exp-h:first-child { margin-top: 0; }
    .exp-list { padding-left: 18px; color: var(--text); line-height: 1.85; }
    .exp-list li { margin-bottom: 6px; font-size: 13.5px; color: var(--text-mid); }
    .exp-example { background: rgba(255,255,255,0.03); border-left: 2px solid rgba(255,255,255,0.15); padding: 12px 14px; margin-top: 10px; border-radius: 0 6px 6px 0; font-style: italic; color: var(--text); font-size: 13.5px; line-height: 1.8; }

    /* ── VOCAB ── */
    .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; padding: 16px; border-top: 1px solid var(--border); }
    .vocab-word { font-weight: 600; font-size: 13.5px; color: var(--text-bright); }
    .vocab-def  { font-size: 12.5px; color: var(--text); margin-top: 2px; line-height: 1.45; }

    /* ── TEXTAREA ── */
    textarea { width: 100%; min-height: 260px; padding: 16px; background: var(--bg-deep); border: 1px solid var(--border); border-radius: 10px; color: var(--text-bright); font-family: 'Outfit', sans-serif; font-size: 14px; line-height: 1.8; resize: vertical; transition: border-color 0.2s; margin-top: 4px; }
    textarea:focus { outline: none; border-color: var(--terra-border); }

    /* ── WORD COUNT ── */
    .wc-wrap { margin-top: 10px; display: flex; align-items: center; gap: 12px; }
    .wc-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
    .wc-fill { height: 100%; background: var(--terra); border-radius: 2px; transition: width 0.3s; max-width: 100%; }
    .wc-fill.done { background: var(--success); }
    .wc-text { font-family: 'Geist Mono', monospace; font-size: 11.5px; color: var(--text); white-space: nowrap; }
    .wc-text.done { color: var(--success); }

    /* ── SAVE REMINDER ── */
    .save-reminder { background: rgba(212,132,90,0.08); border: 1px solid var(--terra-border); border-radius: 10px; padding: 16px 18px; margin-top: 14px; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .save-reminder p { color: var(--terra); font-size: 13px; margin: 0; }
    .save-reminder p strong { color: var(--terra); }

    /* ── BUTTONS ── */
    button { font-family: 'Outfit', sans-serif; font-weight: 500; border: none; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
    .btn-primary { background: var(--terra); color: #fff; padding: 11px 24px; font-size: 14px; font-weight: 600; }
    .btn-primary:hover { background: #e09268; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .btn-ghost { background: transparent; color: var(--text); padding: 9px 18px; font-size: 13px; border: 1px solid var(--border-mid); }
    .btn-ghost:hover { border-color: var(--terra-border); color: var(--text-mid); }
    .btn-success { background: var(--success); color: #fff; padding: 11px 24px; font-size: 14px; font-weight: 600; }
    .btn-success:hover { background: #5e9870; transform: translateY(-1px); }
    .btn-copy { background: rgba(212,132,90,0.15); color: var(--terra); padding: 9px 18px; font-size: 13px; border: 1px solid var(--terra-border); }
    .btn-copy:hover { background: rgba(212,132,90,0.25); }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 22px; }

    /* ── WELCOME / MENU ── */
    .welcome-eyebrow { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 16px; }
    .welcome-title { font-family: 'Fraunces', serif; font-size: clamp(30px, 6vw, 50px); font-weight: 700; color: var(--text-bright); letter-spacing: -1px; line-height: 1.05; margin-bottom: 10px; }
    .welcome-title em { color: var(--terra); font-style: italic; }
    .welcome-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; }
    .welcome-body { max-width: 500px; margin: 0 auto 28px; font-size: 15px; color: var(--text); line-height: 1.8; }

    .ch-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 16px; }
    @media(max-width:480px) { .ch-grid { grid-template-columns: repeat(2,1fr); } }
    .ch-tile { background: var(--bg-card2); border: 1px solid var(--border); border-radius: 12px; padding: 20px 14px; cursor: pointer; text-align: center; transition: all 0.2s; }
    .ch-tile:hover { border-color: var(--terra-border); background: rgba(212,132,90,0.05); }
    .ch-tile.done { border-color: rgba(80,128,96,0.3); background: rgba(80,128,96,0.05); }
    .ch-num { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; color: var(--terra); line-height: 1; margin-bottom: 6px; }
    .ch-tile.done .ch-num { color: var(--success); }
    .ch-name { font-size: 12px; color: var(--text-dim); font-weight: 500; }

    .ending-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 16px 0; }
    .ending-stat { background: var(--bg-card2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .ending-stat.top { border-color: var(--terra-border); background: var(--terra-dim); }
    .ending-num { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 700; color: var(--terra); line-height: 1; }
    .ending-lbl { font-size: 12px; color: var(--text-dim); margin-top: 5px; }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    .hidden { display: none !important; }

    @media(max-width:600px) { .card, .writing-wrap { padding: 18px; } }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Den Digitala <span>Rösten</span></div>
  <div class="nav-right">
    <div class="nav-steps" id="navSteps"></div>
    <div class="nav-actions">
      <button class="btn-ghost" id="copyBtn" onclick="App.copyText()">Kopiera text</button>
      <button class="btn-ghost" onclick="RetroExport.open()">Exportera PDF</button>
      <button class="btn-ghost" onclick="App.confirmReset()">Börja om</button>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="score-row hidden" id="scoreRow">
    <div class="score-chip" id="scR">Risktagare: 0</div>
    <div class="score-chip" id="scA">Analytiker: 0</div>
    <div class="score-chip" id="scF">Försiktig: 0</div>
  </div>
  <div id="app"></div>
</div>

<script>
// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
const S = {
  ch:0, texts:{}, choices:{}, scores:{R:0,A:0,F:0}, welcome:true,
  save(){ localStorage.setItem('ddr5', JSON.stringify(this)); },
  load(){
    try{ const d=JSON.parse(localStorage.getItem('ddr5')||'null'); if(d) Object.assign(this,d); }catch(e){}
  },
  profile(){
    const {R,A,F}=this.scores;
    if(R>=A&&R>=F) return 'R';
    if(A>=R&&A>=F) return 'A';
    return 'F';
  }
};

const PMAP={'1A':'R','1B':'A','1C':'F','2A':'R','2B':'A','2C':'F','3A':'R','3B':'A','3C':'F','4A':'R','4B':'A','4C':'F','5A':'R','5B':'A','5C':'F'};
const MIN_WORDS = 150;

function wc(t){ return t ? t.split(/\s+/).filter(w=>w.length>0).length : 0; }

function choices(id, opts){
  const sel = S.choices[id];
  return `<div class="choices">${opts.map(o=>`
    <button class="choice-btn ${sel===o.id?'selected':''}" onclick="App.pick(${id},'${o.id}')">
      <div class="choice-dot"></div><span>${o.text}</span>
    </button>`).join('')}</div>`;
}

function scaffold(parts){
  const id = 's'+Math.random().toString(36).slice(2,6);
  const partsHtml = parts.map(p=>`
    <div class="scaffold-part">
      <div class="scaffold-part-label">${p.label}</div>
      <div class="scaffold-starter">${p.starter}</div>
      ${p.hint?`<div class="scaffold-hint">${p.hint}</div>`:''}
    </div>`).join('');
  return `
    <div class="scaffold">
      <div class="scaffold-toggle closed" id="st_${id}" onclick="App.togScaffold('${id}')">
        <span>SKRIV MED STÖD – startmeningar och deluppgifter</span>
        <span class="scaffold-arrow">▼</span>
      </div>
      <div class="scaffold-body" id="sb_${id}">
        <div class="scaffold-content">${partsHtml}</div>
      </div>
    </div>`;
}

function exp(label, content, vocabHtml){
  const id = 'e'+Math.random().toString(36).slice(2,6);
  return `<div class="expander" id="${id}">
    <div class="exp-trigger" onclick="App.tog('${id}')">
      <span>${label}</span><span class="exp-arrow">▼</span>
    </div>
    <div class="exp-body">
      <div class="exp-content">${content}</div>
      ${vocabHtml?`<div class="vocab-grid">${vocabHtml}</div>`:''}
    </div>
  </div>`;
}

function vocabHtml(arr){
  return arr.map(v=>`<div><div class="vocab-word">${v.w}</div><div class="vocab-def">${v.d}</div></div>`).join('');
}

function writingContext(ch, choice){
  const ctx = {
    1:{ A:'Du är öppen och aktiv online. Det är en del av dig.', B:'Du är ganska vanlig online – kollar men delar inte så mycket.', C:'Du är försiktig med vad du delar online. Det har alltid känts självklart.' },
    2:{ A:'Du svarade Aiden öppet. Det kändes naturligt – hen verkade trevlig.', B:'Du svarade kort och avvaktande. Ville se vart det ledde.', C:'Du frågade Sam innan du svarade. Sam tyckte det kändes konstigt, men du svarade ändå – lite.' },
    3:{ A:'Du bestämde dig för att svara ordentligt. Aiden hade frågat – och du hade en åsikt.', B:'Du ville formulera din åsikt men höll det generellt. Ingenting personligt.', C:'Du svarade vagt. Men i ditt huvud tänkte du igenom vad du faktiskt tycker.' },
    4:{ A:'Aiden föreslog att ni skulle träffas. Du tänkte att det kändes okej. Sam var inte lika säker.', B:'Aiden föreslog ett möte. Du och Sam bestämde er för att undersöka kontot noggrant först.', C:'Aiden föreslog ett möte. Du kände direkt att det inte stämde. Sam höll med.' },

const Audio = {
  ctx:null,
  init(){ if(this.ctx) return; try{ this.ctx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} },
  aidenPing(){
    this.init(); if(!this.ctx) return;
    const ac=this.ctx, t=ac.currentTime;
    const o1=ac.createOscillator(), g1=ac.createGain();
    o1.type='sine'; o1.frequency.setValueAtTime(880,t); o1.frequency.exponentialRampToValueAtTime(660,t+0.3);
    g1.gain.setValueAtTime(0.18,t); g1.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o1.connect(g1); g1.connect(ac.destination); o1.start(t); o1.stop(t+0.4);
    const o2=ac.createOscillator(), g2=ac.createGain();
    o2.type='sine'; o2.frequency.setValueAtTime(933,t);
    g2.gain.setValueAtTime(0.06,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o2.connect(g2); g2.connect(ac.destination); o2.start(t); o2.stop(t+0.25);
  },
  chapter6(){
    this.init(); if(!this.ctx) return;
    const ac=this.ctx, t=ac.currentTime;
    const master=ac.createGain();
    master.gain.setValueAtTime(0,t); master.gain.linearRampToValueAtTime(0.7,t+1.5);
    master.gain.setValueAtTime(0.7,t+6); master.gain.linearRampToValueAtTime(0,t+10);
    master.connect(ac.destination);
    const delay=ac.createDelay(1.0); delay.delayTime.value=0.35;
    const dg=ac.createGain(); dg.gain.value=0.45;
    delay.connect(dg); dg.connect(delay); delay.connect(master);
    function tone(freq,st,dur,vol,type='sine'){
      const o=ac.createOscillator(), g=ac.createGain();
      o.type=type; o.frequency.setValueAtTime(freq,st);
      g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(vol,st+0.8);
      g.gain.setValueAtTime(vol,st+dur-1.2); g.gain.linearRampToValueAtTime(0,st+dur);
      o.connect(g); g.connect(master); g.connect(delay); o.start(st); o.stop(st+dur);
    }
    tone(41.2,t,9,0.22,'sawtooth'); tone(61.7,t+0.5,8,0.12); tone(63.0,t+0.5,8,0.08);
    tone(123.5,t+1.2,7,0.09); tone(155.6,t+2.0,6,0.07); tone(185.0,t+2.8,5,0.06,'triangle');
    tone(740,t+3.5,3,0.04); tone(784,t+4.0,2.5,0.03);
  }
};

const TW = {
  run(){
    document.querySelectorAll('.aiden-text[data-tw]').forEach(el=>{
      if(el.dataset.animated) return;
      el.dataset.animated='1';
      const html=el.innerHTML; el.innerHTML='';
      this.typeHtml(el,html);
    });
  },
  typeHtml(el,html){
    const tokens=this.tokenize(html);
    let i=0; const stack=[el];
    const cursor=document.createElement('span'); cursor.className='cursor-blink';
    el.appendChild(cursor);
    const delays={',':120,'.':180,'!':180,'?':180,':':100};
    function next(){
      if(i>=tokens.length){ cursor.remove(); return; }
      const tok=tokens[i++]; const parent=stack[stack.length-1];
      if(tok.type==='open'){
        const node=document.createElement(tok.tag);
        if(tok.attrs) node.setAttribute('class',tok.attrs);
        parent.insertBefore(node,cursor); stack.push(node); setTimeout(next,0);
      } else if(tok.type==='close'){
        stack.pop(); setTimeout(next,0);
      } else { typeChar(tok.val,0,parent); }
    }
    function typeChar(str,idx,parent){
      if(idx>=str.length){ next(); return; }
      const ch=str[idx];
      parent.insertBefore(document.createTextNode(ch),cursor);
      el.appendChild(cursor);
      setTimeout(()=>typeChar(str,idx+1,parent), delays[ch]||22);
    }
    next();
  },
  tokenize(html){
    const tokens=[]; let i=0;
    while(i<html.length){
      if(html[i]==='<'){
        const end=html.indexOf('>',i); const tag=html.slice(i+1,end);
        if(tag.startsWith('/')){
          tokens.push({type:'close',tag:tag.slice(1).trim()});
        } else {
          const si=tag.indexOf(' '); const tn=si>-1?tag.slice(0,si):tag;
          const attrs=si>-1?tag.slice(si+1).replace(/class="([^"]*)"/,'$1'):null;
          tokens.push({type:'open',tag:tn,attrs});
        }
        i=end+1;
      } else {
        let text='';
        while(i<html.length&&html[i]!=='<') text+=html[i++];
        if(text) tokens.push({type:'text',val:text});
      }
    }
    return tokens;
  }
};

  copyText(){
    const names={R:'Risktagare',A:'Analytiker',F:'Försiktig'};
    const chNames=['Presentation','Kontakten','Påverkan','Tvivel','Avslöjandet','Efteråt'];
    const chTypes=['Berättande text','Berättande text + Källkritik','Argumenterande text','Instruerande text','Dialog + Reflektion','Argumenterande text + Reflektion'];
    let out=`DEN DIGITALA RÖSTEN\nProfil: ${names[S.profile()]}\n${'─'.repeat(40)}\n\n`;
    CH.forEach((c,i)=>{ out+=`${c.id}. ${chNames[i].toUpperCase()}\n(${chTypes[i]})\n\n${S.texts[c.id]||'[Inte skrivet ännu]'}\n\n${'─'.repeat(40)}\n\n`; });
    navigator.clipboard.writeText(out).then(()=>{
      const btn=document.getElementById('copyBtn');
      if(btn){ btn.textContent='✓ Kopierat!'; setTimeout(()=>{ btn.textContent='Kopiera text'; },2500); }
    }).catch(()=>{ alert('Kunde inte kopiera. Försök igen.'); });
  }
};

App.init();
</script>
